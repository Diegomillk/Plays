<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supernatural</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');

:root {
  --blood:   #7a0000;
  --ember:   #b02020;
  --gold:    #c9a84c;
  --gold2:   #e8c96a;
  --dark:    #0a0602;
  --smoke:   #1a1208;
  --panel:   #110d06;
  --pale:    #e8dcc8;
  --muted:   rgba(232,220,200,0.4);
  --border:  rgba(201,168,76,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--pale);
  font-family: 'Cinzel', serif;
  overflow-x: hidden;
  cursor: default;
}

/* ── BACKGROUND ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(122,0,0,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 100% 100%, rgba(80,0,0,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 0% 50%,    rgba(60,0,0,0.10) 0%, transparent 50%);
}

.bg-layer::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
  pointer-events: none;
}

/* ── MAIN LAYOUT ── */
#home-screen {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 60px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 50px;
}

.header-eye {
  font-size: 28px;
  color: var(--blood);
  text-shadow: 0 0 20px var(--blood);
  margin-bottom: 12px;
  animation: eye-flicker 5s ease-in-out infinite;
}

@keyframes eye-flicker {
  0%,100% { opacity:1; text-shadow: 0 0 20px var(--blood); }
  92%      { opacity:1; }
  93%      { opacity:0.2; }
  94%      { opacity:1; }
  96%      { opacity:0.5; }
  97%      { opacity:1; }
}

.main-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(32px, 7vw, 72px);
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.08em;
  line-height: 1;
  text-shadow:
    0 0 30px rgba(201,168,76,0.7),
    0 0 80px rgba(122,0,0,0.5),
    3px 3px 0 rgba(0,0,0,0.8);
  animation: title-breathe 6s ease-in-out infinite;
}

@keyframes title-breathe {
  0%,100% { text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 80px rgba(122,0,0,0.5), 3px 3px 0 rgba(0,0,0,0.8); }
  50%     { text-shadow: 0 0 50px rgba(201,168,76,1),   0 0 120px rgba(122,0,0,0.8), 3px 3px 0 rgba(0,0,0,0.8); }
}

.tagline {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(12px, 2vw, 16px);
  color: var(--blood);
  letter-spacing: 0.2em;
  margin-top: 10px;
}

.hr-ornament {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px auto 0;
  width: fit-content;
}

.hr-line {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}

.hr-line.right { background: linear-gradient(90deg, var(--gold), transparent); }

.hr-symbol {
  color: var(--gold);
  font-size: 16px;
  text-shadow: 0 0 10px var(--gold);
}

/* ── LOADING STATE ── */
#loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 60px 0;
}

.loading-sigil {
  width: 60px; height: 60px;
  border: 1px solid var(--blood);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1.2s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── ERROR STATE ── */
#error-state {
  display: none;
  text-align: center;
  padding: 40px;
  max-width: 500px;
}

.error-icon { font-size: 40px; color: var(--blood); margin-bottom: 16px; }
.error-title { font-size: 16px; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.1em; }
.error-msg { font-size: 12px; color: var(--muted); line-height: 1.7; }

/* ── SEASONS GRID ── */
#episodes-container {
  display: none;
  width: 100%;
  max-width: 1000px;
}

.season-block {
  margin-bottom: 50px;
}

.season-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(14px, 2.5vw, 20px);
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.season-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
}

.season-title-num {
  background: var(--blood);
  color: var(--pale);
  font-family: 'Cinzel', serif;
  font-size: 10px;
  padding: 3px 10px;
  letter-spacing: 0.3em;
}

.episodes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}

.ep-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, transform 0.25s;
}

.ep-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.ep-card:hover {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(122,0,0,0.4), 0 0 20px rgba(201,168,76,0.1);
}

.ep-card:hover::before { opacity: 1; }

.ep-label {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: var(--blood);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.ep-code {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(201,168,76,0.4);
}

.ep-num {
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.15em;
}

.ep-play-icon {
  position: absolute;
  bottom: 8px; right: 10px;
  font-size: 14px;
  color: var(--blood);
  opacity: 0;
  transition: opacity 0.2s;
}

.ep-card:hover .ep-play-icon { opacity: 1; }

/* ── EMPTY STATE ── */
#empty-state {
  display: none;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-text { font-size: 12px; letter-spacing: 0.2em; }

/* ── PLAYER SCREEN ── */
#player-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  flex-direction: column;
}

#player-screen.active { display: flex; }

.player-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

#player-screen:hover .player-top-bar,
#player-screen.show-bar .player-top-bar {
  opacity: 1;
}

.back-btn {
  background: none;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  padding: 8px 18px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}

.back-btn:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}

.player-ep-label {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(12px, 2vw, 18px);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,168,76,0.5);
  letter-spacing: 0.1em;
}

video#main-video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

/* ── END OVERLAY ── */
#end-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  backdrop-filter: blur(6px);
}

#end-overlay.active { display: flex; }

.end-sigil {
  font-size: 60px;
  color: var(--blood);
  animation: end-pulse 2.5s ease-in-out infinite;
  text-shadow: 0 0 40px var(--blood);
}

@keyframes end-pulse {
  0%,100% { transform: scale(1); filter: brightness(1); }
  50%     { transform: scale(1.08); filter: brightness(1.3); }
}

.end-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(20px, 4vw, 36px);
  color: var(--gold);
  text-align: center;
  letter-spacing: 0.08em;
  text-shadow: 0 0 30px rgba(201,168,76,0.6);
}

.end-sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(13px, 2vw, 18px);
  color: var(--muted);
  letter-spacing: 0.1em;
}

.end-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.end-btn {
  padding: 14px 36px;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}

.end-btn-primary {
  background: var(--blood);
  border-color: var(--blood);
  color: var(--pale);
}

.end-btn-primary:hover {
  background: var(--ember);
  box-shadow: 0 0 30px rgba(122,0,0,0.6);
}

.end-btn-secondary {
  background: transparent;
  border-color: var(--gold);
  color: var(--gold);
}

.end-btn-secondary:hover {
  background: rgba(201,168,76,0.1);
  box-shadow: 0 0 20px rgba(201,168,76,0.2);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--blood); }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .episodes-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .player-top-bar { padding: 10px 14px; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>

<!-- ═══════════════ HOME SCREEN ═══════════════ -->
<div id="home-screen">

  <header class="header">
    <div class="header-eye">𓂀</div>
    <h1 class="main-title">Supernatural</h1>
    <p class="tagline">Saving people. Hunting things. The family business.</p>
    <div class="hr-ornament">
      <div class="hr-line"></div>
      <span class="hr-symbol">✦</span>
      <div class="hr-line right"></div>
    </div>
  </header>

  <!-- Loading -->
  <div id="loading-state">
    <div class="loading-sigil"></div>
    <p class="loading-text">Buscando episódios...</p>
  </div>

  <!-- Error -->
  <div id="error-state">
    <div class="error-icon">☽</div>
    <p class="error-title">Não foi possível carregar</p>
    <p class="error-msg" id="error-msg-text"></p>
    <button class="set-btn" style="margin-top:20px;padding:12px 28px;font-size:12px;letter-spacing:0.2em" onclick="retryFetch()">↺ &nbsp;Tentar novamente</button>
  </div>

  <!-- Empty -->
  <div id="empty-state">
    <div class="empty-icon">📂</div>
    <p class="empty-text">Nenhum episódio encontrado na pasta <code>eps/</code></p>
  </div>

  <!-- Episodes -->
  <div id="episodes-container"></div>

  <!-- DEBUG -->
  <div id="debug-out" style="display:none;background:#111;border:1px solid #c9a84c;color:#e8dcc8;font-family:monospace;font-size:12px;padding:16px;margin-top:20px;max-width:700px;width:100%;line-height:1.8;word-break:break-all"></div>

</div>

<!-- ═══════════════ PLAYER SCREEN ═══════════════ -->
<div id="player-screen">
  <div class="player-top-bar">
    <button class="back-btn" onclick="backToHome()">← Voltar</button>
    <span class="player-ep-label" id="player-label">S00E00</span>
    <div style="width:80px"></div>
  </div>

  <video id="main-video" controls playsinline></video>

  <!-- End of episode overlay -->
  <div id="end-overlay">
    <div class="end-sigil">☽ ✦ ☾</div>
    <p class="end-title">Episódio concluído</p>
    <p class="end-sub">O que deseja fazer agora?</p>
    <div class="end-buttons">
      <button class="end-btn end-btn-primary" onclick="goToSite()">
        ⟶ &nbsp; Ir para o site
      </button>
      <button class="end-btn end-btn-secondary" onclick="backToHome()">
        ☰ &nbsp; Escolher outro ep
      </button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const GITHUB_USER   = 'Diegomillk';
const GITHUB_REPO   = 'Plays';
const GITHUB_BRANCH = 'main';
const EPS_FOLDER    = 'eps';
const REDIRECT_URL  = 'https://diegomillk.github.io/Supernatural/';

// Git Trees API — 1 requisição pra tudo, bem menos chance de rate limit
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let allEpisodes = [];  // { season, ep, code, filename, url }

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', fetchEpisodes);

async function fetchEpisodes() {
  try {
    const res = await fetch(API_URL, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });

    if (!res.ok) {
      const body = await res.text().catch(() => '');
      if (res.status === 404) throw new Error(
        `Repositório <b>${GITHUB_USER}/${GITHUB_REPO}</b> não encontrado.<br><br>` +
        `Verifique se o repositório é público e a branch é <code>${GITHUB_BRANCH}</code>.`
      );
      if (res.status === 403) throw new Error(
        `Limite de requisições da API do GitHub atingido.<br>Aguarde ~1 hora e clique em <b>Tentar novamente</b>.`
      );
      throw new Error(`Erro ${res.status} da API do GitHub.<br><small>${body.slice(0,300)}</small>`);
    }

    const data = await res.json();

    // Git Trees API retorna { tree: [...] }
    const tree = data.tree || [];

    // Filtra arquivos dentro da pasta eps/ com padrão sXXeXX.mp4
    const regex = /^(s(\d+)e(\d+))\.mp4$/i;
    allEpisodes = tree
      .filter(item => {
        if (item.type !== 'blob') return false;
        // path pode ser "eps/S01E01.mp4"
        const parts = item.path.split('/');
        const folder = parts.length > 1 ? parts[parts.length - 2] : '';
        const filename = parts[parts.length - 1];
        return folder.toLowerCase() === EPS_FOLDER.toLowerCase() && regex.test(filename);
      })
      .map(item => {
        const filename = item.path.split('/').pop();
        const m = filename.match(regex);
        // Monta URL raw diretamente — não precisa de download_url
        const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${item.path}`;
        return {
          code:     m[1].toUpperCase(),
          season:   parseInt(m[2], 10),
          ep:       parseInt(m[3], 10),
          filename: filename,
          url:      rawUrl,
        };
      })
      .sort((a, b) => a.season - b.season || a.ep - b.ep);

    // DEBUG — mostra o que foi encontrado
    const debugEl = document.getElementById('debug-out');
    const allMp4 = tree.filter(i => i.path.toLowerCase().endsWith('.mp4'));
    debugEl.innerHTML =
      `<b>Total no tree:</b> ${tree.length}<br>` +
      `<b>.mp4 encontrados:</b> ${allMp4.length}<br>` +
      `<b>Paths mp4:</b><br>${allMp4.map(i => '• ' + i.path).join('<br>') || '(nenhum)'}<br><br>` +
      `<b>Episódios parseados:</b> ${allEpisodes.length}<br>` +
      `${allEpisodes.map(e => '• ' + e.code + ' → ' + e.url).join('<br>')}`;
    debugEl.style.display = 'block';

    renderEpisodes();
  } catch(err) {
    showError(err.message || String(err));
  }
}

function renderEpisodes() {
  try {
    hide('loading-state');

    if (allEpisodes.length === 0) {
      show('empty-state');
      return;
    }

    // Group by season
    const seasons = {};
    allEpisodes.forEach(ep => {
      if (!seasons[ep.season]) seasons[ep.season] = [];
      seasons[ep.season].push(ep);
    });

    const container = document.getElementById('episodes-container');
    container.innerHTML = '';

    Object.keys(seasons).sort((a,b) => a-b).forEach(sNum => {
      const block = document.createElement('div');
      block.className = 'season-block';

      block.innerHTML = `
        <div class="season-title">
          <span class="season-title-num">Temporada ${sNum}</span>
        </div>
        <div class="episodes-grid" id="season-grid-${sNum}"></div>
      `;
      container.appendChild(block);

      const grid = document.getElementById(`season-grid-${sNum}`);
      seasons[sNum].forEach(ep => {
        const card = document.createElement('div');
        card.className = 'ep-card';
        card.innerHTML = `
          <div class="ep-label">episódio</div>
          <div class="ep-code">${ep.code}</div>
          <div class="ep-num">Ep ${ep.ep}</div>
          <span class="ep-play-icon">▶</span>
        `;
        card.addEventListener('click', () => playEpisode(ep));
        grid.appendChild(card);
      });
    });

    container.style.display = 'block';
  } catch(err) {
    showError('Erro ao renderizar episódios: ' + err.message);
  }
}

// ══════════════════════════════════════════════
// PLAYER
// ══════════════════════════════════════════════
function playEpisode(ep) {
  const videoUrl = ep.url;

  document.getElementById('player-label').textContent = ep.code;
  const vid = document.getElementById('main-video');
  vid.src = videoUrl;

  document.getElementById('end-overlay').classList.remove('active');
  document.getElementById('player-screen').classList.add('active');

  vid.play().catch(() => {});

  // Fullscreen
  const ps = document.getElementById('player-screen');
  if (ps.requestFullscreen)            ps.requestFullscreen();
  else if (ps.webkitRequestFullscreen) ps.webkitRequestFullscreen();
  else if (ps.mozRequestFullScreen)    ps.mozRequestFullScreen();

  // End event
  vid.onended = () => {
    document.getElementById('end-overlay').classList.add('active');
  };
}

function backToHome() {
  const vid = document.getElementById('main-video');
  vid.pause();
  vid.src = '';

  document.getElementById('player-screen').classList.remove('active');
  document.getElementById('end-overlay').classList.remove('active');

  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});

  // Re-fetch to pick up any new eps
  document.getElementById('episodes-container').innerHTML = '';
  hide('episodes-container');
  hide('error-state');
  hide('empty-state');
  show('loading-state');
  fetchEpisodes();
}

function goToSite() {
  window.location.href = REDIRECT_URL;
}

function retryFetch() {
  hide('error-state');
  hide('empty-state');
  show('loading-state');
  fetchEpisodes();
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function show(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = id === 'player-screen' ? 'flex' : 'block';
}
function hide(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

function showError(msg) {
  hide('loading-state');
  const el = document.getElementById('error-state');
  document.getElementById('error-msg-text').innerHTML = msg;
  el.style.display = 'block';
}

// Show top bar briefly on touch devices
document.getElementById('player-screen').addEventListener('touchstart', () => {
  const ps = document.getElementById('player-screen');
  ps.classList.add('show-bar');
  clearTimeout(ps._barTimer);
  ps._barTimer = setTimeout(() => ps.classList.remove('show-bar'), 3000);
});
</script>
</body>
</html>
